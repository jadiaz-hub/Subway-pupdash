<!DOCTYPE html>
<html>
<head>
    <title>Hairstyle Generator</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f3f3f3;
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: #333;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 450px;
            margin: auto;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
        }

        select, button {
            padding: 10px;
            margin-top: 15px;
            font-size: 16px;
            border-radius: 6px;
        }

        button {
            background-color: #6a5acd;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #5a4abd;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        img {
            margin-top: 20px;
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>Hairstyle Generator</h1>

    <div class="container">
        <p>Select your hair type:</p>

        <select id="hairType">
            <option value="curly">Curly</option>
            <option value="straight">Straight</option>
            <option value="wavy">Wavy</option>
            <option value="coily">Coily</option>
        </select>

        <br>

        <button onclick="generateHairstyle()">Generate Hairstyle</button>

        <div class="result" id="hairstyleResult"></div>
        <img id="hairstyleImage" src="" alt="">
    </div>

    <script>
        const hairstyles = {
            curly: [
                {name: "Curly High Puff", img: "https://source.unsplash.com/400x400/?curly-hair-woman"},
                {name: "Curly Bob", img: "https://source.unsplash.com/400x400/?curly-bob"},
                {name: "Curly Ponytail", img: "https://source.unsplash.com/400x400/?curly-ponytail"}
            ],
            straight: [
                {name: "Sleek Long Hair", img: "https://source.unsplash.com/400x400/?straight-hair-woman"},
                {name: "Blunt Cut", img: "https://source.unsplash.com/400x400/?blunt-haircut"},
                {name: "Straight High Ponytail", img: "https://source.unsplash.com/400x400/?straight-ponytail"}
            ],
            wavy: [
                {name: "Beach Waves", img: "https://source.unsplash.com/400x400/?wavy-hair-woman"},
                {name: "Layered Waves", img: "https://source.unsplash.com/400x400/?layered-wavy-hair"},
                {name: "Wavy Lob", img: "https://source.unsplash.com/400x400/?wavy-lob"}
            ],
            coily: [
                {name: "Coily Afro", img: "https://source.unsplash.com/400x400/?afro-hairstyle"},
                {name: "Coily Twist Out", img: "https://source.unsplash.com/400x400/?twist-out-hair"},
                {name: "Coily Braided Style", img: "https://source.unsplash.com/400x400/?braided-natural-hair"}
            ]
        };

        function generateHairstyle() {
            const type = document.getElementById("hairType").value;
            const options = hairstyles[type];

            const randomIndex = Math.floor(Math.random() * options.length);
            const chosen = options[randomIndex];

            document.getElementById("hairstyleResult").textContent = chosen.name;
            document.getElementById("hairstyleImage").src = chosen.img;
        }
    </script>

</body>
</html>
